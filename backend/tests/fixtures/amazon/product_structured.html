<!doctype html>
<html>
  <head>
    <title>Structured Product</title>
    <meta property="og:image" content="https://images.example.com/main.jpg" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": "Organizer Cavi Premium",
        "description": "Soluzione modulare per cavi da scrivania.",
        "brand": { "@type": "Brand", "name": "CableMaster" },
        "image": ["https://images.example.com/main.jpg"],
        "aggregateRating": { "@type": "AggregateRating", "ratingValue": "4.6", "reviewCount": "2310" },
        "offers": { "@type": "Offer", "price": "29.99", "priceCurrency": "EUR" }
      }
    </script>
  </head>
  <body>
    <h1 id="productTitle">Organizer Cavi Premium</h1>
    <div id="feature-bullets">
      <ul>
        <li>Compatibile con setup desktop e gaming.</li>
        <li>Materiali premium anti-graffio.</li>
      </ul>
    </div>
  </body>
</html>
